; =============================================
; GSP Control - Configuration file
; Gyro-Stabilized Platform Control Application
; =============================================

[Network]
; IP адрес и порт центрального контроллера гироплатформы
ip=192.168.1.100
port=5000

; Таймаут определения потери связи (мс)
connection_timeout_ms=5000

[TargetIDs]
; Идентификаторы целевых нагрузок (первый байт пакета)
; По умолчанию: камера=11, дальномер=13, гироплатформа=41
camera=11
rangefinder=13
gyro=41

[Joystick]
; Индекс устройства SDL2 (-1 = автоматический выбор первого доступного)
device_index=-1

; Инверсия осей (true/false)
invert_yaw=false
invert_pitch=false

; Номера кнопок для команд камеры и дальномера (настраиваемые)
button_zoom_in=0
button_zoom_out=1
button_autofocus=2
button_focus_infinity=3
button_brightness_up=4
button_brightness_down=5
button_rangefinder_shot=6

[Polling]
; Частота опроса гироплатформы (Гц)
gyro_hz=10

; Интервал опроса позиции зума камеры (мс)
zoom_poll_interval_ms=2500

[Camera]
; Фиксированные позиции зума (в формате VISCA Direct, 0x0000..0x4000 примерно)
; Можно менять под свою камеру
zoom_positions=0x0000,0x1000,0x2000,0x3000,0x4000
zoom_position_names=1x,2x,4x,8x,10x

; Текущая выбранная позиция зума по умолчанию (индекс из списка выше)
default_zoom_index=0

[Rangefinder]
; Минимальная защита от случайного выстрела
safety_lock_enabled=true
[Video]
; Порт RTP/H.264 видеопотока
port=5000

; Таймаут приёма UDP (мс)
timeout_ms=40

; Multicast-адрес (если поток multicast). Пустая строка = unicast
multicast=232.32.32.32
